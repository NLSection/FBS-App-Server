name: Build & publish FBS server image

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# This workflow lives in Dev/ and is synced to FBS-App-Server/ via
# scripts/sync-server.ps1; it runs inside the Server repo (where it has push
# access to ghcr.io). Triggered on every push to main; tag-pushes also
# produce a versioned image.
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract package version
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Compute image tags
        id: tags
        run: |
          repo="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/fbs-app-server"
          tags="$repo:latest,$repo:v${{ steps.ver.outputs.version }}"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            tags="$tags,$repo:${GITHUB_REF_NAME}"
          fi
          echo "tags=$tags" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# FBS server — Synology Container Manager / docker-compose.
# Gebruik een named volume voor de DB — Docker beheert het volume zelf,
# geen handmatige mkdir nodig op de host. Toegang tot fbs.db loopt via
# /var/lib/docker/volumes/fbs_db/_data/ of via een container-shell.
version: "3.8"

services:
  fbs:
    image: ghcr.io/nlsection/fbs-app-server:latest
    container_name: fbs-server
    restart: unless-stopped
    ports:
      - "3210:3000"
    volumes:
      - fbs_db:/data
    environment:
      - NODE_ENV=production
      - DB_PATH=/data/fbs.db
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  fbs_db:
